server:
  port: 8081

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5433/account_db
    username: banking
    password: banking123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    function:
      definition: customerCreated;accountCreated
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        customerCreated-in-0:
          destination: banking.customer.created
          group: account-service
          content-type: application/json
        accountCreated-out-0:
          destination: banking.account.created
          content-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://account-db:5432/account_db
  cloud:
    stream:
      kafka:
        binder:
          brokers: kafka:29092
