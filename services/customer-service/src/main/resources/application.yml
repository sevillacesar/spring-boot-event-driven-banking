server:
  port: 8080

spring:
  application:
    name: customer-service
  datasource:
    url: jdbc:postgresql://localhost:5432/customer_db
    username: banking
    password: banking123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  cloud:
    function:
      definition: customerCreated
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        customerCreated-out-0:
          destination: banking.customer.created
          content-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  level:
    com.banking: INFO
---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://customer-db:5432/customer_db
  cloud:
    stream:
      kafka:
        binder:
          brokers: kafka:29092
