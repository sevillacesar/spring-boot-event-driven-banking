server:
  port: 8084

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://localhost:5435/payment_db
    username: banking
    password: banking123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    function:
      definition: paymentInitiated;paymentProcessed
    stream:
      kafka:
        binder:
          brokers: localhost:9092
      bindings:
        paymentInitiated-out-0:
          destination: banking.payment.initiated
          content-type: application/json
        paymentProcessed-out-0:
          destination: banking.payment.processed
          content-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4318/v1/traces

logging:
  level:
    com.banking: INFO

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://payment-db:5432/payment_db
  cloud:
    stream:
      kafka:
        binder:
          brokers: kafka:29092
